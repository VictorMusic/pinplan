name: Actualizar eventos

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: cd scraper && python scraper.py
      - run: |
          git config user.name "PinPlanBot"
          git config user.email "bot@pinplan.app"
          git add eventos.json
          git diff --staged --quiet || git commit -m "chore: eventos $(date -u '+%Y-%m-%d %H:%M')"
          git push
