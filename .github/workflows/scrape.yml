name: Actualizar eventos

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml
      - run: cd scraper && python scraper.py
        env:
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}
      - run: |
          git config user.name "PinPlanBot"
          git config user.email "bot@pinplan.app"
          git add eventos.json
          git diff --staged --quiet || git commit -m "chore: eventos $(date -u '+%Y-%m-%d %H:%M')"
          git push
