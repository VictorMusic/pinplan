<style>
:root{
  --black:#000;--border:#1a1a1a;--border2:#222;
  --yellow:#F5FF00;
  --text:#f0f0f0;--subtext:#707070;
  --card-bg:#0a0a0a;--overlay:rgba(0,0,0,0.9);
  --sk:rgba(255,255,255,0.05);--sk2:rgba(255,255,255,0.1);
  --footer-c:#383838;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Epilogue',sans-serif;color:var(--text);background:var(--black);overscroll-behavior-y:contain;}

/* HEADER */
.app-header{position:fixed;top:0;left:0;right:0;z-index:50;max-width:420px;margin:0 auto;padding:.75rem 1.25rem .4rem;display:flex;align-items:center;justify-content:space-between;background:var(--black);}
.logo-svg{height:28px;width:auto;}
.logo-svg path{fill:var(--yellow);}
.upd{display:flex;align-items:center;gap:.35rem;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--yellow);animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.65);}}
.upd-t{font-size:.6rem;color:#444;}

/* MAIN */
.app{position:relative;z-index:1;max-width:420px;margin:0 auto;padding-top:4.5rem;padding-bottom:5.5rem;}

/* DATE NAV */
.date-nav{padding:.4rem 1.25rem .5rem;display:flex;align-items:center;justify-content:center;gap:.6rem;}
.arr{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--text);font-size:1.2rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;-webkit-user-select:none;}
.arr:disabled{opacity:.2;cursor:default;}
.arr:not(:disabled):active{background:rgba(255,255,255,.1);transform:scale(.92);}
.date-main{font-family:'Epilogue',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:1.25rem;letter-spacing:.06em;line-height:1;color:var(--text);text-align:center;min-width:180px;}


/* EVENT LIST */
#event-list{padding:.6rem 1rem 0;display:flex;flex-direction:column;gap:.5rem;}

/* SKELETON */
.skeleton{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:.75rem .9rem;display:grid;grid-template-columns:56px 1fr;gap:0 .75rem;align-items:center;}
.sk-img{width:56px;height:56px;border-radius:10px;background:var(--sk);animation:shimmer 1.4s ease-in-out infinite alternate;}
.sk-lines{display:flex;flex-direction:column;gap:8px;}
.sk-line{height:10px;border-radius:5px;background:var(--sk);animation:shimmer 1.4s ease-in-out infinite alternate;}
.sk-line.w70{width:70%;}.sk-line.w45{width:45%;}
@keyframes shimmer{from{background:var(--sk);}to{background:var(--sk2);}}

/* CARDS */
.card{display:grid;grid-template-columns:56px 1fr auto;gap:0 .75rem;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:.75rem .9rem;cursor:pointer;align-items:start;transition:transform .12s;}
.card:active{background:#111;border-color:#222;transform:scale(.985);}
.ev-img{width:56px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#111;}
.ev-img img{width:100%;height:100%;object-fit:cover;display:block;}
.ev-info{min-width:0;}
.ev-title{font-size:.93rem;font-weight:600;line-height:1.2;color:var(--text);}
.ev-sala{font-size:.72rem;color:var(--subtext);display:flex;align-items:center;gap:.25rem;margin-top:.25rem;}
.ev-sala svg{flex-shrink:0;opacity:.5;}
.hora-wrap{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-top:1px;}
.hora{font-family:'Epilogue',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:1.35rem;line-height:1;color:var(--yellow);}



/* CTA */
.cta-box{margin:.25rem 0 0;border:1px dashed #1e1e1e;border-radius:14px;padding:.85rem 1rem;cursor:pointer;}
.cta-title{font-size:.8rem;font-weight:600;color:var(--yellow);margin-bottom:.2rem;}
.cta-sub{font-size:.72rem;color:#555;line-height:1.5;}

/* CARPE DIEM */
.carpe-diem{padding:2rem 1.25rem;text-align:center;}
.carpe-title{font-family:'Epilogue',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:1.3rem;color:#222;letter-spacing:.04em;line-height:1.3;}
.carpe-sub{font-size:.72rem;color:#1a1a1a;margin-top:.4rem;font-style:italic;}

/* EMPTY */
.empty{padding:2.5rem 1.25rem;text-align:center;}
.empty-title{font-family:'Epilogue',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:1.4rem;color:#2a2a2a;letter-spacing:.04em;margin-bottom:.4rem;}
.empty-sub{font-size:.78rem;color:#333;line-height:1.7;}

/* FOOTER */
.footer{margin-top:2rem;padding:.9rem 1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #111;}
.footer-version,.footer-contact{font-size:.72rem;font-family:'Epilogue',sans-serif;color:var(--footer-c);letter-spacing:.05em;background:none;border:none;outline:none;padding:0;margin:0;cursor:default;}
.footer-contact{cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#282828;}
.footer-contact:active{color:#666;}

/* POPUP */

/* DAY CHIPS */
.day-chips{padding:.5rem 0 .3rem;display:flex;align-items:center;gap:.35rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-left:1.25rem;padding-right:1.25rem;}
.day-chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:.4rem .7rem;border-radius:10px;border:1.5px solid #1e1e1e;background:transparent;color:#555;cursor:pointer;user-select:none;-webkit-user-select:none;min-width:50px;-webkit-tap-highlight-color:transparent;}
.chip:active{transform:scale(.93);}
.chip.active{background:var(--yellow);border-color:var(--yellow);}
.chip-name{font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;line-height:1;}
.chip.active .chip-name{color:#000;}
.chip-num{font-family:'Epilogue',sans-serif;font-weight:900;font-size:1.25rem;line-height:1.1;color:var(--text);letter-spacing:-.02em;}
.chip.active .chip-num{color:#000;}
.chip-lbl{font-size:.52rem;color:#333;margin-top:1px;}
.chip.active .chip-lbl{color:rgba(0,0,0,.45);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:420px;margin:0 auto;background:#000;border-top:1px solid #111;display:flex;padding-bottom:env(safe-area-inset-bottom,0);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:.6rem .5rem .55rem;cursor:pointer;border:none;background:none;color:#383838;-webkit-tap-highlight-color:transparent;}
.bnav-btn:active{opacity:.6;}
.bnav-btn.active svg,.bnav-btn.active span{color:var(--yellow);}
.bnav-btn svg{width:20px;height:20px;stroke:currentColor;}
.bnav-btn span{font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:inherit;}

.pop-ov{position:fixed;inset:0;z-index:100;background:var(--overlay);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding-top:70px;opacity:0;pointer-events:none;transition:opacity .2s;}
.pop-ov.open{opacity:1;pointer-events:all;}
.pop{width:calc(100% - 2rem);max-width:400px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:20px;position:relative;max-height:calc(100vh - 86px);overflow-y:auto;transform:translateY(-12px) scale(.97);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.pop-ov.open .pop{transform:translateY(0) scale(1);}
.pop-x{position:absolute;top:.75rem;right:.75rem;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.25);color:#ccc;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;font-weight:300;}
.pop-img-wrap{width:100%;height:190px;border-radius:20px 20px 0 0;overflow:hidden;background:#111;position:relative;}
.pop-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.pop-body{padding:.9rem 1.1rem 0;}
.pop-main-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;}
.pop-left{flex:1;min-width:0;}
.pop-title{font-size:1.2rem;font-weight:700;line-height:1.2;color:var(--text);word-break:break-word;}
.pop-sala{font-size:.75rem;color:var(--subtext);margin-top:.3rem;display:flex;align-items:center;gap:.25rem;}
.pop-sala svg{flex-shrink:0;opacity:.5;}
.pop-right{text-align:right;flex-shrink:0;}
.pop-dia{font-family:'Epilogue',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:1rem;letter-spacing:.1em;color:var(--yellow);line-height:1;display:block;}
.pop-hora{font-family:'Epilogue',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:2.2rem;line-height:1.05;color:var(--yellow);letter-spacing:.04em;display:block;}
.pop-desc{font-size:.82rem;color:#484848;line-height:1.65;margin-top:.8rem;padding-top:.8rem;border-top:1px solid #141414;}
.pop-actions{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.9rem 1.1rem 1.25rem;}
.btn{display:flex;align-items:center;justify-content:center;gap:.45rem;border-radius:12px;padding:.75rem;font-family:'Epilogue',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;}
.btn:active{transform:scale(.96);}
.btn-maps{background:#111;border:1px solid #1e1e1e;color:#555;}
.btn-share{background:var(--yellow);color:#000;}

</style>

const MAX_DAYS=14;

let offset=0,allEvents=[],salasDB=[],currentView='list';

// Restore saved offset
try{
  const saved=parseInt(localStorage.getItem('pinplan_offset')||'0');
  const savedDate=localStorage.getItem('pinplan_offset_date')||'';
  const todayStr=new Date().toISOString().slice(0,10);
  if(savedDate===todayStr&&saved>=0&&saved<MAX_DAYS)offset=saved;
  else{localStorage.setItem('pinplan_offset','0');localStorage.setItem('pinplan_offset_date',todayStr);}
}catch(e){}

function nowMadrid(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Madrid'}));}
function isoOf(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateAt(n){const d=nowMadrid();d.setDate(d.getDate()+n);return d;}
function dateLabel(d,off){const dow=DAYS_S[d.getDay()],day=d.getDate(),mon=MONTHS_A[d.getMonth()];if(off===0)return`${DAYS_L[d.getDay()]} ${day} ${mon}`;if(off===1)return`Mañana · ${dow} ${day} ${mon}`;return`${dow} ${day} ${mon}`;}
function diaCorto(d){return`${DAYS_S[d.getDay()]} ${d.getDate()}`;}
function validImg(u){return u&&typeof u==='string'&&u.startsWith('http')&&!u.includes('placeholder')&&!u.includes('lorem')&&!u.includes('default')&&!u.includes('no-image')&&u.length>20;}
function fallbackFor(t,i){let h=0;for(let j=0;j<t.length;j++)h=(h*31+t.charCodeAt(j))&0xfffffff;return FALLBACK[(h+i)%FALLBACK.length];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cleanSala(s){return(s||'').replace(/,?\s*(Zaragoza|Zaragoza\s*,?\s*Espa[nñ]a?|Espa[nñ]a?|Spain|50\d{3})\b/gi,'').replace(/\s{2,}/g,' ').trim();}

// Match sala name to salas.json entry — fuzzy
function getSalaInfo(salaNombre){
  if(!salaNombre||!salasDB.length)return null;
  var raw=salaNombre.toLowerCase().trim();
  var cleaned=cleanSala(salaNombre).toLowerCase().trim();
  // 1. Exact match on nombre (raw or cleaned)
  var found=salasDB.find(function(sala){
    var n=sala.nombre.toLowerCase();
    return n===raw||n===cleaned;
  });
  if(found)return found;
  // 2. Keyword match
  found=salasDB.find(function(sala){
    return sala.keywords.some(function(kw){
      var k=kw.toLowerCase();
      return raw.includes(k)||cleaned.includes(k)||k.includes(cleaned);
    });
  });
  if(found)return found;
  // 3. Partial — first significant word
  var firstWord=cleaned.split(' ').filter(function(w){return w.length>3;})[0]||'';
  if(firstWord){
    found=salasDB.find(function(sala){
      return sala.nombre.toLowerCase().includes(firstWord)||
             sala.keywords.some(function(kw){return kw.toLowerCase().includes(firstWord);});
    });
  }
  return found||null;
}

// Generate stable event ID from titulo+fecha
function eventId(ev){
  return btoa(encodeURIComponent((ev.titulo+ev.fecha+ev.sala).slice(0,40))).replace(/[^a-zA-Z0-9]/g,'').slice(0,16);
}

// Event URL using hash
function eventUrl(ev){
  return location.origin+location.pathname+'#ev-'+eventId(ev);
}

function showSkeletons(){document.getElementById('event-list').innerHTML=[0,1,2].map(()=>`<div class="skeleton"><div class="sk-img"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w45"></div></div></div>`).join('');}
function dedupEvents(evs){const seen={};return evs.filter(e=>{const key=(e.titulo||'').toLowerCase().replace(/\s+/g,'').slice(0,30)+'|'+e.fecha;if(seen[key])return false;seen[key]=true;return true;});}
function loadImg(src,fallback,cb){const im=new Image();im.referrerPolicy='no-referrer';im.crossOrigin='anonymous';im.onload=()=>cb(im);im.onerror=()=>{const fb=new Image();fb.referrerPolicy='no-referrer';fb.onload=()=>cb(fb);fb.onerror=()=>cb(null);fb.src=fallback;};im.src=src;}

async function shareEvent(ev){
  var texto='¡Planazo! '+ev.titulo+' en '+cleanSala(ev.sala)+(ev.hora?' a las '+ev.hora:'');
  var url=eventUrl(ev);
  var sd={title:'PinPlan · '+ev.titulo,text:texto,url:url};
  if(navigator.share){try{await navigator.share(sd);}catch(e){}}
  else{try{await navigator.clipboard.writeText(texto+'\n'+url);alert('¡Copiado!');}catch(e){prompt('Copia:',texto+' '+url);}}
}

function makeCard(ev,d,i){

  }

  shareBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#3a3a3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;cursor:pointer;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  horaWrap.appendChild(horaDiv);
  if(!d||typeof d==='string')horaWrap.appendChild(dateLabel2);
  horaWrap.appendChild(shareBtn);
  c.appendChild(imgDiv);c.appendChild(infoDiv);c.appendChild(horaWrap);
  var fb=fallbackFor(ev.titulo,i);
  loadImg(validImg(ev.imagen)?ev.imagen:fb,fb,function(im){if(im){im.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';imgDiv.appendChild(im);}else{imgDiv.style.background='#151515';}});
  shareBtn.addEventListener('click',function(e){e.stopPropagation();shareEvent(ev);});

}

function renderList(evs,d){
  var list=document.getElementById('event-list');list.innerHTML='';
  if(!evs.length){
    var empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<div class="empty-title">Aquí no suena nada hoy.</div><div class="empty-sub">Prueba otro día o vuelve en un rato.</div>';
    list.appendChild(empty);list.appendChild(makeCTA());return;
  }

}

function showSalaDetail(salaNombre){
  // Open as overlay (same pattern as event popup)
  var salaInfo=getSalaInfo(salaNombre);

  // Header: name + address + instagram
  var hdr=document.getElementById('sala-detail-header');
  hdr.innerHTML='<div style="font-family:Epilogue,sans-serif;font-weight:900;letter-spacing:-.01em;font-size:1.5rem;color:var(--yellow);letter-spacing:.04em;line-height:1.1;">'+esc(salaNombre)+'</div>'
    +(salaInfo&&salaInfo.direccion?'<div style="font-size:.75rem;color:#555;margin-top:.3rem;display:flex;align-items:center;gap:.3rem;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>'+esc(salaInfo.direccion)+'</div>':'')
    +(salaInfo&&salaInfo.instagram?'<div style="font-size:.7rem;color:#333;margin-top:.15rem;">'+esc(salaInfo.instagram)+'</div>':'');

  // Events list
  var list=document.getElementById('sala-detail-list');list.innerHTML='';
  var today=isoOf(nowMadrid());
  var evs=allEvents.filter(function(e){
    return cleanSala(e.sala)===salaNombre&&e.fecha>=today;
  });
  evs.sort(function(a,b){return(a.fecha+(a.hora||'')).localeCompare(b.fecha+(b.hora||''));});

  if(!evs.length){
    var empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<div class="empty-title">Sin próximos eventos.</div>';
    list.appendChild(empty);
  } else {
    evs.forEach(function(ev,i){
      var card=makeCard(ev,ev.fecha,i);
      // Override click: open event popup from within sala overlay
      card.addEventListener('click',function(){
        closeSala();
        setTimeout(function(){
          var d=new Date(ev.fecha+'T12:00:00');
          openPopup(ev,d,i);
        },250);
      });
      list.appendChild(card);
    });
  }

  // CTA at bottom
  var ctaWrap=document.getElementById('sala-cta-wrap');
  ctaWrap.innerHTML='';
  var cta=makeCTA();
  ctaWrap.appendChild(cta);

  // Open overlay
  document.getElementById('sala-ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeSala(){
  document.getElementById('sala-ov').classList.remove('open');
  document.body.style.overflow='';
}

function openPopup(ev,d,i){
  // Set URL hash for sharing
  var evHash='ev-'+eventId(ev);
  history.replaceState(null,'','#'+evHash);

  const pw=document.getElementById('pimg');pw.innerHTML='';
  const fb=fallbackFor(ev.titulo,i);const src=validImg(ev.imagen)?ev.imagen:fb;
  loadImg(src,fb,im=>{if(im){im.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';pw.appendChild(im);}else{pw.style.background='#151515';}});
  document.getElementById('ptitle').textContent=ev.titulo;
  var salaInfo=getSalaInfo(ev.sala);
  document.getElementById('psala').innerHTML=PIN+'<span style="text-decoration:underline;text-underline-offset:2px;text-decoration-color:#333;">'+esc(cleanSala(ev.sala))+'</span>';
  document.getElementById('psala').onclick=function(){closePopup();setTimeout(function(){showSalaDetail(cleanSala(ev.sala));},200);};
  var dirEl=document.getElementById('pdir');
  if(salaInfo&&salaInfo.direccion){
    dirEl.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>'+esc(salaInfo.direccion);
    dirEl.style.display='flex';
  } else {
    dirEl.style.display='none';
  }
  document.getElementById('pdia').textContent=diaCorto(d);
  document.getElementById('phora').textContent=ev.hora||'—';
  const desc=ev.descripcion||'';const descEl=document.getElementById('pdesc');descEl.textContent=desc;descEl.style.display=desc?'block':'none';
  document.getElementById('bmaps').onclick=()=>window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(ev.sala+' Zaragoza'),'_blank');
  document.getElementById('bshare').onclick=async()=>{
    var url=eventUrl(ev);
    var texto='¡Planazo! '+ev.titulo+' en '+cleanSala(ev.sala)+(ev.hora?' a las '+ev.hora:'');
    var sd={title:'PinPlan · '+ev.titulo,text:texto,url:url};
    if(navigator.share){try{await navigator.share(sd);}catch(e){}}
    else{try{await navigator.clipboard.writeText(texto+'\n'+url);alert('¡Copiado!');}catch(e){prompt('Copia:',texto+' '+url);}}
  };
  document.getElementById('pov').classList.add('open');document.body.style.overflow='hidden';
}

function closePopup(){
  document.getElementById('pov').classList.remove('open');
  document.body.style.overflow='';
  // Remove hash
  history.replaceState(null,'',location.pathname+location.search);
}

function eventId(ev){
  var s=(ev.titulo+ev.fecha+ev.sala).slice(0,40);
  var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0x7fffffff;
  return h.toString(36);
}
function eventUrl(ev){return location.origin+location.pathname+'#ev-'+eventId(ev);}

// Check hash on load — open event if found
function checkHash(){
  var hash=location.hash;
  if(!hash||!hash.startsWith('#ev-'))return;
  var targetId=hash.slice(4);
  var ev=allEvents.find(function(e){return eventId(e)===targetId;});
  if(ev){
    var d=new Date(ev.fecha+'T12:00:00');
    openPopup(ev,d,0);
  }
}

function renderForOffset(){
  const d=dateAt(offset);

  try{localStorage.setItem('pinplan_offset',String(offset));localStorage.setItem('pinplan_offset_date',isoOf(nowMadrid()));}catch(e){}

  if(offset>=MAX_DAYS){
    document.getElementById('event-list').innerHTML='';
    var cd=document.createElement('div');cd.className='carpe-diem';
    cd.innerHTML='<div class="carpe-title">¿Por qué hacer planes a largo plazo cuando hay tanta música que disfrutar antes?</div><div class="carpe-sub">CARPE DIEM · Vuelve a los próximos días</div>';
    document.getElementById('event-list').appendChild(cd);
    return;
  }

  const evs=allEvents.filter(e=>e.fecha===isoOf(d));
  if(currentView==='list')renderList(evs,d);
  else if(currentView==='map')renderMap(evs,d);
}

// ── DAY CHIPS ──────────────────────────────────────────────────────────────
function buildDayChips(){
  var nav=document.getElementById('date-nav-wrap');
  nav.innerHTML='';
  var today=nowMadrid();
  for(var i=0;i<=MAX_DAYS;i++){
    var d=dateAt(i);
    var chip=document.createElement('button');
    chip.className='chip'+(i===offset?' active':'');
    chip.dataset.offset=i;
    var dayName=DAYS_S[d.getDay()];
    var dayNum=d.getDate();
    var mon=MONTHS_A[d.getMonth()];
    var lbl=i===0?'Hoy':i===1?'Mañana':'';
    chip.innerHTML='<span class="chip-name">'+dayName+'</span><span class="chip-num">'+dayNum+'</span><span class="chip-lbl">'+(lbl||mon)+'</span>';
    chip.addEventListener('click',(function(idx){
      return function(){
        if(offset===idx)return;
        offset=idx;
        buildDayChips();
        renderForOffset();
        // Scroll chip into view
        chip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      };
    })(i));
    nav.appendChild(chip);
  }
}

function showSalasBrowser(){
  // Remove existing
  var existing=document.getElementById('sala-browser');
  if(existing)existing.remove();

  var container=document.getElementById('event-list').parentNode;
  var browser=document.createElement('div');
  browser.id='sala-browser';
  browser.style.cssText='padding:.6rem 1rem 0;display:flex;flex-direction:column;gap:.4rem;';

  var hdr=document.createElement('div');
  hdr.style.cssText='font-size:.65rem;color:#333;letter-spacing:.1em;text-transform:uppercase;padding:.2rem 0 .4rem;font-weight:700;';
  hdr.textContent='Próximos eventos por sala';
  browser.appendChild(hdr);

  var today=isoOf(nowMadrid());
  var bySala={};
  allEvents.filter(function(e){return e.fecha>=today;}).forEach(function(ev){
    var key=cleanSala(ev.sala)||'Otros';
    if(!bySala[key])bySala[key]=[];
    bySala[key].push(ev);
  });

  Object.keys(bySala).sort().forEach(function(salaNombre){
    var chip=document.createElement('div');
    chip.style.cssText='background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:.6rem .9rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;';
    var evCount=bySala[salaNombre].length;
    chip.innerHTML='<div style="display:flex;align-items:center;gap:.5rem;"><div style="width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0;"></div><div style="font-size:.88rem;font-weight:700;color:#f0f0f0;">'+esc(salaNombre)+'</div></div><div style="font-size:.72rem;color:#555;">'+evCount+' evento'+(evCount!==1?'s':'')+' ›</div>';
    chip.addEventListener('click',function(){showSalaDetail(salaNombre);});
    browser.appendChild(chip);
  });

  container.insertBefore(browser, document.getElementById('event-list').nextSibling);
}

function loadAllEvents(){
  showSkeletons();
  Promise.all([
    fetch('eventos.json?_='+Date.now()).then(r=>r.json()),
    fetch('salas.json').then(r=>r.json()).catch(()=>({salas:[]}))
  ]).then(function([data,salasData]){
    allEvents=dedupEvents(data.eventos||[]);
    salasDB=salasData.salas||[];
    if(data.actualizado){const upd=new Date(data.actualizado);const hm=String(upd.getHours()).padStart(2,'0')+':'+String(upd.getMinutes()).padStart(2,'0');document.getElementById('upd-t').textContent='Actualizado '+hm;document.getElementById('upd').style.display='flex';}
    buildDayChips();
    renderForOffset();
    checkHash();
  }).catch(function(){allEvents=[];renderForOffset();});
}

document.getElementById('pov').addEventListener('click',e=>{if(e.target===e.currentTarget)closePopup();});
document.getElementById('px').addEventListener('click',closePopup);
document.getElementById('contact-btn').addEventListener('click',()=>{window.location.href='mailto:'+_m+'?subject=PinPlan feedback';});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{if(document.getElementById('pov').classList.contains('open'))return;const dx=e.changedTouches[0].clientX-tx,dy=Math.abs(e.changedTouches[0].clientY-ty);if(Math.abs(dx)>55&&dy<60){if(dx<0&&offset<MAX_DAYS){offset++;buildDayChips();renderForOffset();}else if(dx>0&&offset>0){offset--;buildDayChips();renderForOffset();}}},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();if(e.key==='ArrowRight'&&offset<MAX_DAYS){offset++;buildDayChips();renderForOffset();}if(e.key==='ArrowLeft'&&offset>0){offset--;buildDayChips();renderForOffset();}});

loadAllEvents();
