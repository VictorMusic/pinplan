<head>

<meta name="description" content="Los conciertos de hoy en Zaragoza, en un vistazo. Mira, elige y ve.">

<meta property="og:description" content="Los conciertos de hoy en Zaragoza, en un vistazo.">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--surface:#0a0a0a;--card:#0a0a0a;
  --border:#1a1a1a;--border2:#222;
  --yellow:#F5FF00;
  --text:#f0f0f0;--subtext:#707070;--muted:#404040;
  --card-bg:#0a0a0a;--overlay:rgba(0,0,0,0.9);
  --sk:rgba(255,255,255,0.05);--sk2:rgba(255,255,255,0.1);
  --footer-c:#383838;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:var(--black);overscroll-behavior-y:contain;}
.app-header{position:fixed;top:0;left:0;right:0;z-index:50;max-width:420px;margin:0 auto;padding:1rem 1.25rem .4rem;display:flex;align-items:flex-end;justify-content:space-between;background:var(--black);}
.logo-wrap{display:flex;align-items:baseline;gap:.5rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;letter-spacing:.04em;color:var(--yellow);}
.logo-city{font-size:.68rem;font-weight:500;color:#555;letter-spacing:.14em;text-transform:uppercase;padding-bottom:.3rem;}
.upd{display:flex;align-items:center;gap:.35rem;padding-bottom:.3rem;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--yellow);animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.65);}}
.upd-t{font-size:.6rem;color:#444;}
.app{position:relative;z-index:1;max-width:420px;margin:0 auto;padding-top:5.5rem;padding-bottom:1rem;}
.date-nav{padding:.4rem 1.25rem .7rem;display:flex;align-items:center;justify-content:center;gap:.6rem;}
.arr{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--text);font-size:1.2rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;-webkit-user-select:none;}
.arr:disabled{opacity:.2;cursor:default;}
.arr:not(:disabled):active{background:rgba(255,255,255,.1);transform:scale(.92);}
@media(hover:none){.arr:not(:disabled):hover{background:rgba(255,255,255,0.04);}}
.date-main{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;line-height:1;color:var(--text);text-align:center;min-width:190px;}
#event-list{padding:0 1rem;display:flex;flex-direction:column;gap:.5rem;}
.skeleton{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:.75rem .9rem;display:grid;grid-template-columns:56px 1fr;gap:0 .75rem;align-items:center;}
.sk-img{width:56px;height:56px;border-radius:10px;background:var(--sk);animation:shimmer 1.4s ease-in-out infinite alternate;}
.sk-lines{display:flex;flex-direction:column;gap:8px;}
.sk-line{height:10px;border-radius:5px;background:var(--sk);animation:shimmer 1.4s ease-in-out infinite alternate;}
.sk-line.w70{width:70%;}.sk-line.w45{width:45%;}
@keyframes shimmer{from{background:var(--sk);}to{background:var(--sk2);}}
.card{display:grid;grid-template-columns:56px 1fr auto;gap:0 .75rem;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:.75rem .9rem;cursor:pointer;align-items:center;transition:transform .12s;}
.card:active{background:#111;border-color:#222;transform:scale(.985);}
@media(hover:none){.card:hover{background:var(--card-bg);border-color:var(--border);}}
.ev-img{width:56px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#111;}
.ev-img img{width:100%;height:100%;object-fit:cover;display:block;}
.ev-info{min-width:0;}
.ev-title{font-size:.93rem;font-weight:600;line-height:1.2;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-sala{font-size:.72rem;color:var(--subtext);display:flex;align-items:center;gap:.25rem;margin-top:.25rem;}
.ev-sala svg{flex-shrink:0;opacity:.5;}
.hora-wrap{text-align:right;flex-shrink:0;}
.hora{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;line-height:1;color:var(--yellow);}
.chev{font-size:.65rem;color:#2a2a2a;margin-top:2px;}
.cta-box{margin:.25rem 0 0;border:1px dashed #1e1e1e;border-radius:14px;padding:.85rem 1rem;}
.cta-title{font-size:.8rem;font-weight:600;color:var(--yellow);margin-bottom:.2rem;}
.cta-sub{font-size:.72rem;color:#555;line-height:1.5;}
.empty{padding:2.5rem 1.25rem;text-align:center;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#2a2a2a;letter-spacing:.04em;margin-bottom:.4rem;}
.empty-sub{font-size:.78rem;color:#333;line-height:1.7;}
.footer{margin-top:2.5rem;padding:.9rem 1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #111;}
.footer-version,.footer-contact{font-size:.72rem;font-family:'Plus Jakarta Sans',sans-serif;color:var(--footer-c);letter-spacing:.05em;background:none;border:none;outline:none;padding:0;margin:0;cursor:default;}
.footer-contact{cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#282828;}
.footer-contact:active{color:#666;}
.pop-ov{position:fixed;inset:0;z-index:100;background:var(--overlay);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding-top:80px;opacity:0;pointer-events:none;transition:opacity .2s;}
.pop-ov.open{opacity:1;pointer-events:all;}
.pop{width:calc(100% - 2rem);max-width:400px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:20px;position:relative;max-height:calc(100vh - 96px);overflow-y:auto;transform:translateY(-12px) scale(.97);transition:transform .28s cubic-bezier(.32,.72,0,1);}
.pop-ov.open .pop{transform:translateY(0) scale(1);}
.pop-x{position:absolute;top:.75rem;right:.75rem;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:#666;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.pop-img-wrap{width:100%;height:190px;border-radius:20px 20px 0 0;overflow:hidden;background:#111;position:relative;}
.pop-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.pop-body{padding:.9rem 1.1rem 0;}
.pop-main-row{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;}
.pop-left{flex:1;min-width:0;}
.pop-title{font-size:1.2rem;font-weight:700;line-height:1.2;color:var(--text);word-break:break-word;}
.pop-sala{font-size:.75rem;color:var(--subtext);margin-top:.3rem;display:flex;align-items:center;gap:.25rem;}
.pop-sala svg{flex-shrink:0;opacity:.5;}
.pop-right{text-align:right;flex-shrink:0;}
.pop-dia{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--yellow);line-height:1;display:block;}
.pop-hora{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1.05;color:var(--yellow);letter-spacing:.04em;display:block;}
.pop-desc{font-size:.82rem;color:#484848;line-height:1.65;margin-top:.8rem;padding-top:.8rem;border-top:1px solid #141414;}
.pop-actions{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.9rem 1.1rem 1.25rem;}
.btn{display:flex;align-items:center;justify-content:center;gap:.45rem;border-radius:12px;padding:.75rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border:none;}
.btn:active{transform:scale(.96);}
.btn-maps{background:#111;border:1px solid #1e1e1e;color:#555;}
.btn-share{background:var(--yellow);color:#000;}
</style>
</head>
<body>
<div class="app-header">
  <div class="logo-wrap">
    <span class="logo">PinPlan</span>
    <span class="logo-city">Zaragoza</span>
  </div>
  <div class="upd" id="upd" style="display:none">
    <div class="dot"></div>
    <span class="upd-t" id="upd-t"></span>
  </div>
</div>
<div class="app">
  <div class="date-nav">
    <button class="arr" id="prev" disabled>&#8249;</button>
    <div class="date-main" id="dmain"></div>
    <button class="arr" id="next">&#8250;</button>
  </div>
  <div id="event-list"></div>
  <footer class="footer">
    <span class="footer-version">V 0.1 · probando probando</span>
    <button class="footer-contact" id="contact-btn">Contacto</button>
  </footer>
</div>
<div class="pop-ov" id="pov">
  <div class="pop">
    <button class="pop-x" id="px">×</button>
    <div class="pop-img-wrap" id="pimg"></div>
    <div class="pop-body">
      <div class="pop-main-row">
        <div class="pop-left">
          <div class="pop-title" id="ptitle"></div>
          <div class="pop-sala" id="psala"></div>
        </div>
        <div class="pop-right">
          <span class="pop-dia" id="pdia"></span>
          <span class="pop-hora" id="phora"></span>
        </div>
      </div>
      <div class="pop-desc" id="pdesc"></div>
    </div>
    <div class="pop-actions">
      <button class="btn btn-maps" id="bmaps">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        Google Maps
      </button>
      <button class="btn btn-share" id="bshare">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Compartir
      </button>
    </div>
  </div>
</div>
<script>
const DAYS_S=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
const DAYS_L=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS_A=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const FALLBACK=['https://images.unsplash.com/photo-1540039155733-5bb30b4f2a96?w=600&q=85','https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=600&q=85','https://images.unsplash.com/photo-1501386761578-eaa54b915b37?w=600&q=85','https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?w=600&q=85','https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600&q=85','https://images.unsplash.com/photo-1468164016595-6108e4c60c8b?w=600&q=85','https://images.unsplash.com/photo-1460723237483-7a6dc9d0b212?w=600&q=85','https://images.unsplash.com/photo-1598387993441-a364f854c3e1?w=600&q=85','https://images.unsplash.com/photo-1571397133301-3f1a73cbe57f?w=600&q=85','https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=600&q=85'];
const PIN=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
const _m=['himnosis','.','music','@','gmail','.','com'].join('');
let offset=0;
try{const saved=parseInt(localStorage.getItem('pinplan_offset')||'0');const savedDate=localStorage.getItem('pinplan_offset_date')||'';const todayStr=new Date().toISOString().slice(0,10);if(savedDate===todayStr&&saved>=0)offset=saved;else{localStorage.setItem('pinplan_offset','0');localStorage.setItem('pinplan_offset_date',todayStr);}}catch(e){}
let allEvents=[];
function nowMadrid(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Madrid'}));}
function isoOf(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateAt(n){const d=nowMadrid();d.setDate(d.getDate()+n);return d;}
function dateLabel(d,off){const dow=DAYS_S[d.getDay()],day=d.getDate(),mon=MONTHS_A[d.getMonth()];if(off===0)return`${DAYS_L[d.getDay()]} ${day} ${mon}`;if(off===1)return`Mañana · ${dow} ${day} ${mon}`;return`${dow} ${day} ${mon}`;}
function diaCorto(d){return`${DAYS_S[d.getDay()]} ${d.getDate()}`;}
function validImg(u){return u&&typeof u==='string'&&u.startsWith('http')&&!u.includes('placeholder')&&!u.includes('lorem')&&!u.includes('default')&&!u.includes('no-image')&&u.length>20;}
function fallbackFor(titulo,idx){let h=0;for(let i=0;i<titulo.length;i++)h=(h*31+titulo.charCodeAt(i))&0xfffffff;return FALLBACK[(h+idx)%FALLBACK.length];}
function showSkeletons(){document.getElementById('event-list').innerHTML=[0,1,2].map(()=>`<div class="skeleton"><div class="sk-img"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w45"></div></div></div>`).join('');}
function dedupEvents(evs){const seen={};return evs.filter(e=>{const key=(e.titulo||'').toLowerCase().replace(/\s+/g,'').slice(0,30)+'|'+e.fecha;if(seen[key])return false;seen[key]=true;return true;});}
function loadAllEvents(){
  showSkeletons();
  fetch('eventos.json?_='+Date.now())
    .then(r=>r.json())
    .then(data=>{
      allEvents=dedupEvents(data.eventos||[]);
      if(data.actualizado){const upd=new Date(data.actualizado);const hm=`${String(upd.getHours()).padStart(2,'0')}:${String(upd.getMinutes()).padStart(2,'0')}`;document.getElementById('upd-t').textContent=`Actualizado ${hm}`;document.getElementById('upd').style.display='flex';}
      renderForOffset();
    })
    .catch(()=>{allEvents=[];renderForOffset();});
}
function renderForOffset(){
  const d=dateAt(offset);
  document.getElementById('dmain').textContent=dateLabel(d,offset);
  document.getElementById('prev').disabled=offset<=0;
  try{localStorage.setItem('pinplan_offset',String(offset));localStorage.setItem('pinplan_offset_date',isoOf(nowMadrid()));}catch(e){}
  renderList(allEvents.filter(e=>e.fecha===isoOf(d)),d);
}
function loadImg(src,fallback,cb){const im=new Image();im.referrerPolicy='no-referrer';im.crossOrigin='anonymous';im.onload=()=>cb(im);im.onerror=()=>{const fb=new Image();fb.referrerPolicy='no-referrer';fb.onload=()=>cb(fb);fb.onerror=()=>cb(null);fb.src=fallback;};im.src=src;}
function renderList(evs,d){
  const list=document.getElementById('event-list');
  if(!evs.length){
    list.innerHTML=`<div class="empty"><div class="empty-title">Aquí no suena nada hoy.</div><div class="empty-sub">Prueba mañana — el plan está a un deslizamiento.</div></div><div class="cta-box"><div class="cta-title">¿Tocas o tienes una sala?</div><div class="cta-sub">Si subes a un escenario o programas conciertos, hazte oír. Envíanos tu evento.</div></div>`;
    return;
  }
  list.innerHTML='';
  evs.forEach((ev,i)=>{
    const c=document.createElement('div');c.className='card';
    const fb=fallbackFor(ev.titulo,i);
    const src=validImg(ev.imagen)?ev.imagen:fb;
    c.innerHTML=`<div class="ev-img" id="th${offset}_${i}"></div><div class="ev-info"><div class="ev-title">${esc(ev.titulo)}</div><div class="ev-sala">${PIN}${esc(ev.sala)}</div></div><div class="hora-wrap"><div class="hora">${ev.hora||'?'}</div><div class="chev">›</div></div>`;
    const th=c.querySelector(`#th${offset}_${i}`);
    loadImg(src,fb,im=>{if(im){im.style.cssText='width:100%;height:100%;object-fit:cover;display:block;';th.appendChild(im);}else{th.style.background='#151515';}});
    c.addEventListener('click',()=>openPopup(ev,d,i));
    list.appendChild(c);
  });
  const cta=document.createElement('div');
  cta.className='cta-box';
  cta.innerHTML=`<div class="cta-title">¿Tocas o tienes una sala?</div><div class="cta-sub">Si subes a un escenario o programas conciertos, hazte oír. Envíanos tu evento.</div>`;
  list.appendChild(cta);
}
function openPopup(ev,d,i){
  const pw=document.getElementById('pimg');pw.innerHTML='';
  const fb=fallbackFor(ev.titulo,i);
  const src=validImg(ev.imagen)?ev.imagen:fb;
  loadImg(src,fb,im=>{if(im){im.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';pw.appendChild(im);}else{pw.style.background='#151515';}});
  document.getElementById('ptitle').textContent=ev.titulo;
  document.getElementById('psala').innerHTML=`${PIN}${esc(ev.sala)}`;
  document.getElementById('pdia').textContent=diaCorto(d);
  document.getElementById('phora').textContent=ev.hora||'—';
  const desc=ev.descripcion||'';const descEl=document.getElementById('pdesc');descEl.textContent=desc;descEl.style.display=desc?'block':'none';
  document.getElementById('bmaps').onclick=()=>window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.sala+' Zaragoza')}`,'_blank');
  document.getElementById('bshare').onclick=async()=>{const sd={title:'PinPlan · '+ev.titulo,text:`${ev.titulo} en ${ev.sala}${ev.hora?' a las '+ev.hora:''} — PinPlan Zaragoza`,url:location.href};if(navigator.share){try{await navigator.share(sd);}catch(e){}}else{try{await navigator.clipboard.writeText(`${sd.text}\n${sd.url}`);alert('¡Copiado!');}catch(e){prompt('Copia:',sd.text);}}};
  document.getElementById('pov').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePopup(){document.getElementById('pov').classList.remove('open');document.body.style.overflow='';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.getElementById('pov').addEventListener('click',e=>{if(e.target===e.currentTarget)closePopup();});
document.getElementById('px').addEventListener('click',closePopup);
document.getElementById('prev').addEventListener('click',()=>{if(offset>0){offset--;renderForOffset();}});
document.getElementById('next').addEventListener('click',()=>{offset++;renderForOffset();});
document.getElementById('contact-btn').addEventListener('click',()=>{window.location.href='mailto:'+_m+'?subject=PinPlan feedback';});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{if(document.getElementById('pov').classList.contains('open'))return;const dx=e.changedTouches[0].clientX-tx,dy=Math.abs(e.changedTouches[0].clientY-ty);if(Math.abs(dx)>55&&dy<60){if(dx<0){offset++;renderForOffset();}else if(offset>0){offset--;renderForOffset();}}},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();if(e.key==='ArrowRight'){offset++;renderForOffset();}if(e.key==='ArrowLeft'&&offset>0){offset--;renderForOffset();}});
loadAllEvents();
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
</html>
